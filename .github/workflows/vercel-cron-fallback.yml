name: Vercel Cron Fallback

on:
  schedule:
    - cron: '15,30,45 * * * *'
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: Which production job to run
        required: true
        default: both
        type: choice
        options:
          - both
          - cleanup
          - reminders

permissions: {}

env:
  SITE_URL: https://kosmicalign.vercel.app

jobs:
  cleanup:
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'cleanup') ||
      github.event.schedule == '15,30,45 * * * *' ||
      github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate scheduler secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured for this repository; skipping cleanup fallback."
            exit 0
          fi

      - name: Run cleanup job
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          status=$(curl --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            --output /tmp/cleanup-response.json \
            --write-out "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/cleanup" || true)

          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            cat /tmp/cleanup-response.json
            exit 0
          fi

          echo "Cleanup fallback returned HTTP $status and was skipped."
          exit 0

  reminders:
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == 'reminders') ||
      github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate scheduler secret
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is not configured for this repository; skipping reminder fallback."
            exit 0
          fi

      - name: Run reminder job
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          status=$(curl --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30 \
            --output /tmp/reminders-response.json \
            --write-out "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/reminders" || true)

          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            cat /tmp/reminders-response.json
            exit 0
          fi

          echo "Reminder fallback returned HTTP $status and was skipped."
          exit 0
